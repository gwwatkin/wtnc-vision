<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 840" font-family="sans-serif" font-size="13">
  <style>
    .chrome { fill:#e2e8f0; stroke:#94a3b8; }
    .page   { fill:#ffffff; stroke:#64748b; stroke-width:1.5; }
    .ctl    { fill:#f1f5f9; stroke:#94a3b8; rx:4; }
    .btn    { fill:#e2e8f0; stroke:#64748b; rx:4; }
    .newctl { fill:#ecfdf5; stroke:#059669; stroke-width:1.5; rx:4; }
    .card   { fill:#f8fafc; stroke:#94a3b8; rx:6; }
    .cand   { fill:#fafaf9; stroke:#a8a29e; stroke-width:1.3; stroke-dasharray:5 4; rx:6; }
    .panel  { fill:#ffffff; stroke:#64748b; stroke-width:1.5; rx:8; }
    .img    { fill:#1e293b; rx:4; }
    .title  { font-weight:bold; font-size:14px; fill:#0f172a; }
    .small  { font-size:11.5px; fill:#334155; }
    .tiny   { font-size:10px; fill:#64748b; }
    .num    { font-weight:bold; font-size:15px; fill:#0f172a; }
    .badge  { font-size:9.5px; font-weight:bold; }
    .new    { font-size:10px; fill:#059669; font-weight:bold; }
    .note   { font-size:11px; fill:#059669; font-style:italic; }
  </style>

  <text x="20" y="26" class="title" font-size="17">Review &amp; Editing — UX draft</text>
  <text x="330" y="26" class="new">green = new in this iteration</text>

  <!-- ═══════════ LEFT: the unified page ═══════════ -->
  <rect x="20" y="42" width="640" height="778" class="page"/>
  <rect x="20" y="42" width="640" height="26" class="chrome"/>
  <circle cx="38" cy="55" r="5" fill="#f87171"/><circle cx="56" cy="55" r="5" fill="#fbbf24"/><circle cx="74" cy="55" r="5" fill="#34d399"/>
  <text x="95" y="59" class="tiny">localhost:8000 — Frame Collector</text>

  <!-- capture controls (unchanged) -->
  <rect x="36" y="80" width="130" height="24" class="ctl"/><text x="44" y="96" class="small">Source: Camera ▾</text>
  <rect x="176" y="80" width="150" height="24" class="ctl"/><text x="184" y="96" class="small">Label: race-day</text>
  <rect x="336" y="80" width="60" height="24" class="btn"/><text x="352" y="96" class="small">Stop</text>
  <rect x="406" y="80" width="150" height="24" class="ctl"/><text x="414" y="96" class="small">Roster CSV · Upload</text>
  <text x="570" y="96" class="tiny">(unchanged)</text>

  <!-- run controls row: browse + candidates toggle NEW -->
  <rect x="36" y="112" width="150" height="24" class="ctl"/><text x="44" y="128" class="small">View run: race-day ▾</text>
  <rect x="196" y="112" width="110" height="24" class="newctl"/><text x="206" y="128" class="small">Browse frames</text>
  <rect x="316" y="112" width="170" height="24" class="newctl"/><text x="326" y="128" class="small">☑ Show candidates (2)</text>
  <text x="496" y="128" class="new">NEW</text>

  <!-- preview -->
  <rect x="36" y="148" width="608" height="130" class="img"/>
  <text x="300" y="218" fill="#94a3b8" font-size="14">camera / video preview (unchanged)</text>

  <!-- status + queue status NEW -->
  <text x="36" y="300" class="small">Recording — sent: 412  dropped: 0  last: ok 201</text>
  <rect x="36" y="310" width="608" height="26" class="newctl"/>
  <circle cx="52" cy="323" r="5" fill="#f59e0b"/>
  <text x="64" y="327" class="small">Queue: 412 captured · 280 processed · <tspan font-weight="bold">132 pending</tspan> — processing… results current to 14:32:07</text>
  <text x="600" y="327" class="new">NEW</text>

  <!-- timeline -->
  <text x="36" y="362" class="title" font-size="13">Timeline — order of record</text>
  <line x1="36" y1="376" x2="644" y2="376" stroke="#cbd5e1"/>
  <text x="310" y="392" class="tiny">── 14:32 ──</text>

  <!-- normal card -->
  <rect x="36" y="402" width="608" height="40" class="card"/>
  <text x="50" y="427" class="num">132</text>
  <text x="92" y="427" class="small">Marta Ríos · Cat 2 · 14:32:41</text>

  <!-- edited card -->
  <rect x="36" y="450" width="608" height="40" class="card"/>
  <text x="50" y="475" class="num">97</text>
  <text x="92" y="475" class="small">Jon Aldai · Cat 2 · 14:32:40</text>
  <rect x="560" y="458" width="66" height="16" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="570" y="470" class="badge" fill="#854d0e">✎ edited</text>

  <!-- candidate card NEW -->
  <rect x="36" y="498" width="608" height="40" class="cand"/>
  <text x="50" y="523" class="num" fill="#78716c">?</text>
  <text x="92" y="523" class="small" fill="#57534e">unidentified rider — hint <tspan font-weight="bold">1?8</tspan> · 14:32:12 · click to resolve →</text>
  <text x="600" y="523" class="new">NEW</text>

  <text x="310" y="558" class="tiny">── 14:31 ──</text>

  <!-- manual card -->
  <rect x="36" y="568" width="608" height="40" class="card"/>
  <text x="50" y="593" class="num">45</text>
  <text x="92" y="593" class="small">Lena Duarte · Cat 3 · 14:31:03</text>
  <rect x="552" y="576" width="74" height="16" rx="8" fill="#dcfce7" stroke="#059669"/>
  <text x="562" y="588" class="badge" fill="#065f46">✚ manual</text>

  <!-- moved card -->
  <rect x="36" y="616" width="608" height="40" class="card"/>
  <text x="50" y="641" class="num">210</text>
  <text x="92" y="641" class="small">— not in roster · 14:30:58</text>
  <rect x="558" y="624" width="68" height="16" rx="8" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="568" y="636" class="badge" fill="#3730a3">↕ moved</text>

  <text x="36" y="690" class="note">Default view = today's page + one status line. Candidates are dashed/muted</text>
  <text x="36" y="706" class="note">and inline at their time; the toggle hides them. Badges mark provenance.</text>
  <text x="36" y="740" class="tiny">Untouched: capture controls, roster upload, run selector, pack/lane layout,</text>
  <text x="36" y="754" class="tiny">card click → sidebar, polling model.</text>

  <!-- ═══════════ RIGHT: sidebar modes ═══════════ -->

  <!-- Panel A: crossing selected -->
  <rect x="690" y="42" width="470" height="330" class="panel"/>
  <text x="706" y="66" class="title" font-size="13">Sidebar — crossing selected</text>
  <text x="1120" y="66" class="small">×</text>
  <rect x="706" y="78" width="438" height="150" class="img"/>
  <rect x="880" y="98" width="90" height="110" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="884" y="92" fill="#34d399" font-size="11" font-weight="bold">97 · 0.94</text>
  <text x="706" y="250" class="num">#97 — Jon Aldai</text>
  <text x="706" y="268" class="small">Cat 2 · 14:32:40 · edited ✎</text>
  <!-- action row NEW -->
  <rect x="706" y="282" width="88" height="24" class="newctl"/><text x="714" y="298" class="small">Edit number</text>
  <rect x="802" y="282" width="90" height="24" class="newctl"/><text x="810" y="298" class="small">Move earlier</text>
  <rect x="900" y="282" width="80" height="24" class="newctl"/><text x="908" y="298" class="small">Move later</text>
  <rect x="988" y="282" width="60" height="24" class="newctl"/><text x="998" y="298" class="small">Delete</text>
  <rect x="1056" y="282" width="88" height="24" class="newctl"/><text x="1064" y="298" class="small">View frames</text>
  <text x="706" y="330" class="new">NEW — edit actions; candidate cards open the same sidebar with</text>
  <text x="706" y="344" class="new">Promote / Dismiss and the hint number pre-filled instead.</text>

  <!-- Panel B: frame browser -->
  <rect x="690" y="392" width="470" height="428" class="panel"/>
  <text x="706" y="416" class="title" font-size="13">Sidebar — frame browser</text>
  <text x="1100" y="416" class="new">NEW</text>

  <!-- scrubber -->
  <text x="706" y="440" class="tiny">14:20:05</text>
  <line x1="760" y1="436" x2="1090" y2="436" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="985" cy="436" r="7" fill="#059669"/>
  <text x="1098" y="440" class="tiny">14:38:12</text>

  <!-- filmstrip -->
  <g>
    <rect x="706" y="454" width="64" height="44" class="img" opacity="0.55"/>
    <rect x="778" y="454" width="64" height="44" class="img" opacity="0.55"/>
    <rect x="850" y="454" width="64" height="44" class="img" stroke="#059669" stroke-width="2.5"/>
    <rect x="922" y="454" width="64" height="44" class="img" opacity="0.55"/>
    <rect x="994" y="454" width="64" height="44" class="img" opacity="0.55"/>
    <rect x="1066" y="454" width="64" height="44" class="img" opacity="0.55"/>
  </g>
  <text x="706" y="512" class="tiny">filmstrip: ±12 s window around the scrubber position</text>

  <!-- main frame with overlay -->
  <rect x="706" y="522" width="438" height="180" class="img"/>
  <rect x="850" y="546" width="110" height="130" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="854" y="540" fill="#f59e0b" font-size="11" font-weight="bold">1?8 · needs_review</text>
  <text x="712" y="696" fill="#94a3b8" font-size="10.5">rider boxes drawn client-side, colored by status</text>

  <!-- stepper + add crossing -->
  <rect x="706" y="714" width="30" height="24" class="btn"/><text x="716" y="730" class="small">←</text>
  <rect x="742" y="714" width="30" height="24" class="btn"/><text x="752" y="730" class="small">→</text>
  <text x="784" y="730" class="small">frame 143 / 412 · 14:32:12 · rider detected — no confident read</text>

  <rect x="706" y="750" width="130" height="26" class="newctl"/>
  <text x="716" y="767" class="small" font-weight="bold">Add crossing here</text>
  <rect x="846" y="750" width="200" height="26" class="ctl"/>
  <text x="854" y="767" class="tiny">number… (roster list; blank = unidentified)</text>

  <text x="706" y="800" class="note">Opened from a crossing/candidate ("View frames", anchored at its time)</text>
  <text x="706" y="814" class="note">or the global "Browse frames" button. ←/→ steps single frames.</text>
</svg>
