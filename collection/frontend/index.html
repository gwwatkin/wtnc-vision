<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frame Collector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Frame Collector</h1>

  <!-- ── Capture controls (existing + source selector + video file + roster) ── -->
  <div id="controls">
    <!-- Source selector (D7) — task6 wires behavior -->
    <label for="source-select">Source:</label>
    <select id="source-select">
      <option value="camera">Camera</option>
      <option value="video">Video file</option>
    </select>

    <!-- Camera selection — task6 populates via enumerateDevices -->
    <label for="camera-select">Camera:</label>
    <select id="camera-select">
      <option value="">-- select camera --</option>
    </select>

    <!-- Video file input (D7) — hidden until source=video; task6 wires behavior -->
    <input type="file" id="video-file" accept="video/*" style="display:none" />

    <!-- Per-shot label / active run (design §8) -->
    <label for="label-input">Label:</label>
    <input
      type="text"
      id="label-input"
      placeholder="e.g. lap3-nearside"
      maxlength="64"
      autocomplete="off"
    />

    <!-- Start/stop recording -->
    <button id="toggle-btn" disabled>Start</button>
  </div>

  <!-- Roster upload controls (FR16) — task6 wires POST /roster -->
  <div id="roster-controls">
    <label for="roster-file">Roster CSV:</label>
    <input type="file" id="roster-file" accept=".csv,text/csv" />
    <button id="roster-upload-btn" type="button">Upload Roster</button>
    <span id="roster-status"></span>
  </div>

  <!-- Run selector — task5 populates from GET /runs -->
  <div id="run-controls">
    <label for="run-select">View run:</label>
    <select id="run-select">
      <option value="">-- active label --</option>
    </select>
  </div>

  <!-- Live camera / video preview (FR1) -->
  <video id="preview" autoplay playsinline muted></video>

  <!-- Status line: recording state, frames sent, last result -->
  <div id="status">Not recording &mdash; frames sent: 0</div>

  <!-- Results timeline (FR2/FR3) — task5 renders into this -->
  <main id="timeline">
    <p class="timeline-empty">Waiting for results&hellip;</p>
  </main>

  <!-- Detail sidebar (D2/D3) — task5 manages; hidden by default -->
  <aside id="sidebar" hidden>
    <button id="sidebar-close" type="button" aria-label="Close sidebar">&times;</button>
    <div id="sidebar-content"></div>
  </aside>

  <!-- config.js must load before app.js so window.COLLECTION_CONFIG is set -->
  <script src="config.js"></script>
  <script src="app.js"></script>
  <!-- results entry point — ES module; task5 implements real behavior -->
  <script type="module" src="results/results.js"></script>
</body>
</html>
